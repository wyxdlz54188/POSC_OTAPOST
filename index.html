<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTTP POST 测试工具</title>
    <!-- 直接沿用你提供的 sojson 核心样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="so_box" class="layout-container">
        <div class="layui-row pt10 layui-form">
            <!-- 第一行：协议 + 网址 + 发送按钮 -->
            <div class="layui-form-item">
                <div class="url-group">
                    <select id="protocol" class="protocol-select">
                        <option value="https://">HTTPS://</option>
                        <option value="http://">HTTP://</option>
                    </select>
                    <input type="text" id="url" class="url-input" placeholder="请输入地址 如：www.sojson.com" autocomplete="off">
                    <button class="layui-btn" id="sendBtn">
                        <span class="btn-text">发送 POST 请求</span>
                        <span class="loading-spinner" style="display:none;">⏳</span>
                    </button>
                </div>
            </div>

            <!-- 第二行：JSON 数据输入区 -->
            <div class="layui-form-item">
                <div class="json-area">
                    <textarea id="jsonData" class="layui-textarea" placeholder='{"key": "value"}' rows="6"></textarea>
                    <div class="button-group">
                        <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="formatBtn">格式化</button>
                        <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="clearBtn">清空响应</button>
                    </div>
                    <small id="jsonError" class="error"></small>
                </div>
            </div>

            <!-- 第三行：响应结果展示区 -->
            <div class="layui-form-item">
                <div class="layui-tab mb0" lay-filter="result-tab">
                    <ul class="layui-tab-title">
                        <li class="layui-this" data-tab="body"><h4>Response Body</h4></li>
                        <li data-tab="headers"><h4>Response Headers</h4></li>
                        <li data-tab="timing"><h4>耗时信息</h4></li>
                    </ul>
                    <div class="layui-tab-content">
                        <!-- 响应体 -->
                        <div class="layui-tab-item layui-show" id="bodyTab">
                            <textarea id="responseBody" class="layui-textarea h300" placeholder="等待发送请求..." readonly></textarea>
                        </div>
                        <!-- 响应头 -->
                        <div class="layui-tab-item" id="headersTab">
                            <textarea id="responseHeaders" class="layui-textarea h300" placeholder="等待发送请求..." readonly></textarea>
                        </div>
                        <!-- 耗时信息 -->
                        <div class="layui-tab-item" id="timingTab">
                            <div class="timing-info">
                                <div class="timing-item"><span class="label">请求耗时:</span><span id="requestTime">-</span></div>
                                <div class="timing-item"><span class="label">响应大小:</span><span id="responseSize">-</span></div>
                                <div class="timing-item"><span class="label">状态码:</span><span id="statusCode">-</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <span id="statusBadge" class="status-badge"></span>
            </div>

            <!-- 历史记录 -->
            <div class="history-section">
                <h4>📜 请求历史</h4>
                <div id="historyList" class="history-list">
                    <p class="empty-history">暂无历史记录</p>
                </div>
                <button class="layui-btn layui-btn-primary layui-btn-sm" id="clearHistoryBtn" style="margin-top:10px;">清空历史</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
